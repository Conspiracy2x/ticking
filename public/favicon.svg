<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"></stop>
      <stop offset="100%" stop-color="#a855f7"></stop>
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="28" fill="#0b0b12" stroke="url(#grad)" stroke-width="3"></circle>

  <!-- Hour hand -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="white" stroke-width="3" stroke-linecap="round"></line>

  <!-- Minute hand -->
  <line x1="32" y1="32" x2="44" y2="32" stroke="white" stroke-width="2" stroke-linecap="round"></line>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="white"></circle>
</svg>